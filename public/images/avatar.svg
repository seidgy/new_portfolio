<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark grey background -->
  <rect width="300" height="400" fill="#121218"/>
  
  <!-- Grid overlay lines -->
  <path d="M 0,100 H 300" stroke="#2A2A35" stroke-width="0.75" stroke-dasharray="4 4"/>
  <path d="M 0,200 H 300" stroke="#2A2A35" stroke-width="0.75"/>
  <path d="M 0,300 H 300" stroke="#2A2A35" stroke-width="0.75" stroke-dasharray="4 4"/>
  <path d="M 100,0 V 400" stroke="#2A2A35" stroke-width="0.75" stroke-dasharray="4 4"/>
  <path d="M 200,0 V 400" stroke="#2A2A35" stroke-width="0.75"/>

  <!-- Purple Accent Circle -->
  <circle cx="150" cy="180" r="90" fill="#7C5CFF" fill-opacity="0.15"/>
  <circle cx="150" cy="180" r="70" stroke="#7C5CFF" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Stylized avatar face contour -->
  <path d="M120 110 C120 90, 180 90, 180 110 C180 130, 175 140, 175 155 C175 170, 185 180, 185 195 C185 210, 165 215, 150 215 C135 215, 115 210, 115 195 C115 180, 125 170, 125 155 C125 140, 120 130, 120 110 Z" fill="#17171F" stroke="#B6B6C5" stroke-width="2"/>
  
  <!-- Stylized hair bun -->
  <circle cx="150" cy="80" r="18" fill="#B6B6C5" stroke="#121218" stroke-width="2"/>
  
  <!-- Shoulders -->
  <path d="M80 320 C80 250, 220 250, 220 320 L220 400 L80 400 Z" fill="#17171F" stroke="#B6B6C5" stroke-width="2"/>
  <path d="M150 215 V255" stroke="#B6B6C5" stroke-width="2" stroke-linecap="round"/>

  <!-- Handwriting annotations -->
  <text x="30" y="50" font-family="Outfit, sans-serif" font-size="12" fill="#7D7D90" transform="rotate(-5, 30, 50)">curiosity</text>
  <text x="30" y="80" font-family="Outfit, sans-serif" font-size="12" fill="#7D7D90" transform="rotate(-5, 30, 80)">empathy</text>
  <text x="30" y="110" font-family="Outfit, sans-serif" font-size="12" fill="#7D7D90" transform="rotate(-5, 30, 110)">logic</text>
  <text x="30" y="140" font-family="Outfit, sans-serif" font-size="12" fill="#7D7D90" transform="rotate(-5, 30, 140)">craft</text>

  <!-- Technical arrows -->
  <path d="M 80,45 H 115 M 115,45 L 110,40 M 115,45 L 110,50" stroke="#7D7D90" stroke-width="0.75"/>
</svg>
